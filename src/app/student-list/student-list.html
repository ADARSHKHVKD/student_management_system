<h2>Student List</h2>

<table border="1" width="100%">

    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Course</th>
        <th>DOB</th>
        <th>FEES</th>
    </tr>

    <tr *ngFor="let student of students">

        <td>{{student.name}}</td>
        <td>{{student.email}}</td>
        <td>{{student.course}}</td>
        <td>{{student.dob}}</td>
         <td>{{student.fees}}</td>

    </tr>

</table>
